# Nginx Configuration for Single Container (FastAPI + React)
# This serves the React frontends and proxies API traffic securely to FastAPI.

upstream fastapi_backend {
    server localhost:8001;
    keepalive 32;
}

server {
    listen 8000;
    server_name _;

    # Maximum upload size
    client_max_body_size 100M;

    # Timeouts for long-running operations (OCR, RAG)
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # React App static files (User frontend)
    location /app {
        alias /app/frontend/dist;
        try_files $uri $uri/ /app/index.html;
    }

    # Admin frontend
    location /admin {
        alias /app/admin-frontend/dist;
        try_files $uri $uri/ /admin/index.html;
    }

    # Static assets (images, CSS, JS) shared
    location /static {
        alias /app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vite dev server assets (if packaged)
    location /assets {
        alias /app/frontend/dist/assets;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ALL API requests route to FastAPI
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Session cookie support (if any)
        proxy_set_header Cookie $http_cookie;

        # WebSocket support (SSE/streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Chunked transfer encoding for streaming
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;

        # CORS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
        add_header Access-Control-Allow-Credentials true;
    }

    # Extra fastapi-only prefix handler (just in case frontend calls it explicitly)
    location /fastapi/ {
        rewrite ^/fastapi/(.*) /$1 break;
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA Fallback - route to User frontend index.html
    location / {
        root /app/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/static;
    }

    # Health check endpoint for container orchestrator
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
