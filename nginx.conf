# Nginx Configuration for SmartLib BASIC
# Dual-backend routing: Flask (default) + FastAPI (new endpoints)
#
# Usage:
#   /fastapi/api/v1/*  → FastAPI (port 8001)
#   /api/*             → Flask (port 8000, default) or FastAPI via feature flag
#   /app/*             → React static files
#   /admin/*           → Admin static files
#   /                  → React app (SPA fallback)
#
# Feature Flag: Set FASTAPI_API_ROUTING=true to route /api/* to FastAPI

upstream flask_backend {
    server web:8000;
    keepalive 32;
}

upstream fastapi_backend {
    server localhost:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # React app static files
    root /app/frontend/dist;
    index index.html;

    # Maximum upload size
    client_max_body_size 100M;

    # Timeouts for long-running operations (OCR, RAG)
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # ============================================================
    # STATIC FILES
    # ============================================================

    # React app (User frontend)
    location /app {
        alias /app/frontend/dist;
        try_files $uri $uri/ /app/index.html;
    }

    # Admin frontend
    location /admin {
        alias /app/admin-frontend/dist;
        try_files $uri $uri/ /admin/index.html;
    }

    # Static assets (images, CSS, JS)
    location /static {
        alias /app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vite dev server assets (development only)
    location /assets {
        alias /app/frontend/dist/assets;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # API ROUTING
    # ============================================================

    # FastAPI-specific endpoints (always route to FastAPI)
    location /fastapi/ {
        # Strip /fastapi prefix and forward to FastAPI
        rewrite ^/fastapi/(.*) /$1 break;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future SSE/streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
    }

    # Flask API endpoints (default)
    # Set FASTAPI_API_ROUTING=true to route to FastAPI instead
    location /api/ {
        # Feature flag check: route to FastAPI if enabled
        # Note: This requires nginx plus or lua module for dynamic routing
        # For simple deployments, manually change the upstream

        # Default: Route to Flask
        proxy_pass http://flask_backend;

        # Alternative: Route to FastAPI (uncomment to enable)
        # proxy_pass http://fastapi_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Session cookie support
        proxy_set_header Cookie $http_cookie;

        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
        add_header Access-Control-Allow-Credentials true;
    }

    # ============================================================
    # AUTH ENDPOINTS (explicit routing)
    # ============================================================

    # Login/Register - can be routed to either backend
    location = /api/login {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/me {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/logout {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # ============================================================
    # UPLOAD ENDPOINTS
    # ============================================================

    location = /upload {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # Large file upload support
        client_max_body_size 100M;
    }

    location /api/upload-status {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /api/check-duplicates {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # ============================================================
    # RAG QUERY ENDPOINTS (streaming support)
    # ============================================================

    location = /api/query {
        proxy_pass http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # SSE streaming support
        proxy_set_header Accept text/event-stream;
        proxy_cache off;
        proxy_buffering off;
        proxy_redirect off;

        # Chunked transfer encoding for streaming
        chunked_transfer_encoding on;
    }

    location /api/resume_rag {
        proxy_pass http://flask_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        # SSE streaming support
        proxy_cache off;
        proxy_buffering off;
    }

    # ============================================================
    # FLASK WEB ROUTES (non-API)
    # ============================================================

    location = /login {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /register {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /logout {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location /change_password {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # ============================================================
    # SPA FALLBACK
    # ============================================================

    # All other routes → React app (for client-side routing)
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ============================================================
    # ERROR HANDLING
    # ============================================================

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /app/static;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
