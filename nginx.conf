# Nginx Configuration for SmartLib
# Pure FastAPI backend + React frontends
#
#   /app/*    → React user SPA   (frontend/dist)
#   /admin/*  → React admin SPA  (admin-frontend/dist)
#   /api/*    → FastAPI           (port 8001)
#   /         → React user SPA   (SPA fallback)

upstream fastapi_backend {
    server localhost:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /app/frontend/dist;
    index index.html;

    client_max_body_size 100M;

    # Timeouts for long-running operations (OCR, RAG, streaming)
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # ============================================================
    # STATIC FILES — React bundles
    # ============================================================

    # User chat frontend (/app)
    location /app {
        alias /app/frontend/dist;
        try_files $uri $uri/ /app/index.html;
    }

    # Admin frontend (/admin)
    location /admin {
        alias /app/admin-frontend/dist;
        try_files $uri $uri/ /admin/index.html;
    }

    # Vite-generated assets
    location /assets {
        alias /app/frontend/dist/assets;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # API — All routes to FastAPI
    # ============================================================

    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support (for /api/v1/query)
        proxy_cache off;
        proxy_buffering off;
        proxy_redirect off;
        chunked_transfer_encoding on;

        # WebSocket/upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SQLAdmin UI (sqladmin mounts at /sqlAdmin)
    location /sqlAdmin {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # SPA FALLBACK
    # ============================================================

    location / {
        try_files $uri $uri/ /index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # ============================================================
    # ERROR HANDLING
    # ============================================================

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        return 200 "Server error\n";
        add_header Content-Type text/plain;
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
