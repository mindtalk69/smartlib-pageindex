{% extends "base.html" %}
{% block title %}Forgot Password - SmartLib{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6 col-xl-5">
    <div class="card shadow-sm border-0">
      <div class="card-body py-5 px-md-5">
        <div class="text-center mb-5">
          <h3 class="fw-bold">Forgot Password</h3>
          <p class="text-secondary mb-0">Recover your SmartLib local account.</p>
        </div>

        <div class="alert alert-light-primary color-primary mb-4">
          <i class="bi bi-info-circle me-1"></i>
          This form is for local accounts only. Provide your username and email for verification.
        </div>

        <form method="post" action="{{ url_for('request_password_reset') }}" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="text" class="form-control form-control-xl" id="username" name="username" placeholder="Username"
              required value="{{ (form_data.username if form_data else '') | default('', true) }}">
            <div class="form-control-icon">
              <i class="bi bi-person"></i>
            </div>
          </div>

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="email" class="form-control form-control-xl" id="email" name="email" placeholder="Email"
              required value="{{ (form_data.email if form_data else '') | default('', true) }}">
            <div class="form-control-icon">
              <i class="bi bi-envelope"></i>
            </div>
          </div>

          <div class="form-group mb-4">
            <label for="reason" class="form-label text-muted small">Reason / Details (Optional)</label>
            <textarea class="form-control" id="reason" name="reason" rows="3"
              placeholder="Any details to help admins verify your request.">{{ (form_data.reason if form_data else '') | default('', true) | trim }}</textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg mt-3">Submit Request</button>

          <div class="text-center mt-4">
            <a href="{{ url_for('login_route') }}" class="text-secondary font-bold">
              <i class="bi bi-arrow-left me-1"></i> Back to Login
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
