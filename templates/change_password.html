{% extends "base.html" %}
{% block title %}Change Password - SmartLib{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card shadow-sm border-0">
      <div class="card-body py-5 px-md-5">
        <div class="text-center mb-5">
          <h3 class="fw-bold">Change Password</h3>
          <p class="text-secondary">Secure your account with a new password.</p>
        </div>

        <form action="{{ url_for('change_password') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="password" class="form-control form-control-xl" id="current_password" name="current_password"
              placeholder="Current Password" required>
            <div class="form-control-icon">
              <i class="bi bi-key"></i>
            </div>
          </div>

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="password" class="form-control form-control-xl" id="new_password" name="new_password"
              placeholder="New Password" required>
            <div class="form-control-icon">
              <i class="bi bi-shield-lock"></i>
            </div>
          </div>

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="password" class="form-control form-control-xl" id="confirm_new_password"
              name="confirm_new_password" placeholder="Confirm New Password" required>
            <div class="form-control-icon">
              <i class="bi bi-shield-lock-fill"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg mt-3">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
