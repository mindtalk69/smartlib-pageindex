{% extends "base.html" %}
{% block title %}Login - SmartLib{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card shadow-sm border-0">
      <div class="card-body py-5 px-md-5">
        <div class="text-center mb-5">
          <h3 class="fw-bold">Login</h3>
          <p class="text-secondary">Please enter your credentials to login.</p>
        </div>

        <form action="{{ url_for('login_route') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="text" class="form-control form-control-xl" id="username" name="username" placeholder="Username"
              required>
            <div class="form-control-icon">
              <i class="bi bi-person"></i>
            </div>
          </div>

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="password" class="form-control form-control-xl" id="password" name="password"
              placeholder="Password" required>
            <div class="form-control-icon">
              <i class="bi bi-shield-lock"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg mt-3">Log in</button>

          <div class="text-center mt-3">
            <a href="{{ url_for('login_azure') }}" class="btn btn-light-primary btn-block btn-lg fw-bold">
              <i class="bi bi-microsoft me-2"></i> Log in with Entra ID
            </a>
          </div>
        </form>

        <div class="text-center mt-5 text-lg fs-6">
          <p class="text-gray-600">Don't have an account? <a href="{{ url_for('register') }}" class="font-bold">Sign
              up</a>.</p>
          <p><a class="font-bold" href="{{ url_for('request_password_reset') }}">Forgot password?</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
