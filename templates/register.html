{% extends "base.html" %}
{% block title %}Register | ChatApp{% endblock %}
{% block content %}
<div class="row justify-content-center">
  {# Use the new shared styled container class and a page-specific class #}
  <div class="col-md-6 styled-form-container register-page-container">
    <h3 class="mb-4">Register</h3>
    <form action="{{ url_for('register') }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <div class="mb-3">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
      </div>
      <button type="submit" class="btn btn-custom w-100">Register</button>
    </form>
    <div class="mt-3">
      <p class="text-center">Already have an account? <a href="{{ url_for('login_route') }}">Login here</a>.</p>
    </div>
  </div>
</div>
{% endblock %}
