{% extends "base.html" %}
{% block title %}Register - SmartLib{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card shadow-sm border-0">
      <div class="card-body py-5 px-md-5">
        <div class="text-center mb-5">
          <h3 class="fw-bold">Sign Up</h3>
          <p class="text-secondary">Create your account to get started.</p>
        </div>

        <form action="{{ url_for('register') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="text" class="form-control form-control-xl" id="username" name="username" placeholder="Username"
              required>
            <div class="form-control-icon">
              <i class="bi bi-person"></i>
            </div>
          </div>

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="email" class="form-control form-control-xl" id="email" name="email" placeholder="Email"
              required>
            <div class="form-control-icon">
              <i class="bi bi-envelope"></i>
            </div>
          </div>

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="password" class="form-control form-control-xl" id="password" name="password"
              placeholder="Password" required>
            <div class="form-control-icon">
              <i class="bi bi-shield-lock"></i>
            </div>
            <div class="form-text small text-muted mt-1">At least 8 chars, 1 uppercase, 1 digit.</div>
          </div>

          <div class="form-group position-relative has-icon-left mb-4">
            <input type="password" class="form-control form-control-xl" id="confirm_password" name="confirm_password"
              placeholder="Confirm Password" required>
            <div class="form-control-icon">
              <i class="bi bi-shield-lock-fill"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg mt-3">Sign Up</button>
        </form>

        <div class="text-center mt-5 text-lg fs-6">
          <p class="text-gray-600">Already have an account? <a href="{{ url_for('login_route') }}" class="font-bold">Log
              in</a>.</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
