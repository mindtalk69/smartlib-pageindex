<!DOCTYPE html>
<html>
<head>
  <title>Loading Animation Preview</title>
  <style>
    /* Dark Theme */
    .dark-theme {
      background-color: #1a1a1a;
      color: white;
      padding: 2rem;
    }
    
    /* Light Theme */
    .light-theme {
      background-color: white;
      color: #333;
      padding: 2rem;
    }

    /* Loading Animation */
    .loading-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 40px;
    }

    .loading-dots div {
      width: 10px;
      height: 10px;
      margin: 0 5px;
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out both;
    }

    .dark-theme .loading-dots div {
      background-color: #3A82E6;
    }

    .light-theme .loading-dots div {
      background-color: #1E5CB3;
    }

    .loading-dots div:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dots div:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes pulse {
      0%, 80%, 100% { 
        transform: scale(0.8);
        opacity: 0.5;
      }
      40% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    .preview-container {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
    }

    .theme-box {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      width: 200px;
    }
  </style>
</head>
<body>
  <h1>Loading Animation Preview</h1>
  <p>Here's a preview of the proposed loading animation that adapts to both light and dark themes:</p>

  <div class="preview-container">
    <div class="theme-box dark-theme">
      <h3>Dark Theme</h3>
      <div class="loading-dots">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>

    <div class="theme-box light-theme">
      <h3>Light Theme</h3>
      <div class="loading-dots">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>
  </div>

  <p>Features:</p>
  <ul>
    <li>Subtle pulsing animation (lightweight performance)</li>
    <li>Theme-adaptive colors</li>
    <li>Smooth transitions</li>
    <li>Small footprint (10px dots)</li>
  </ul>
</body>
</html>
