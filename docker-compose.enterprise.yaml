# Docker Compose configuration for testing SmartLib Enterprise tier locally
# Usage: docker compose -f docker-compose.yaml -f docker-compose.enterprise.yaml up

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: smartlib_admin
      POSTGRES_PASSWORD: smartlib_dev_password
      POSTGRES_DB: smartlibdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres -c shared_preload_libraries=vector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlib_admin -d smartlibdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # Inherit from base docker-compose.yaml
    extends:
      file: docker-compose.yaml
      service: redis

  web:
    # Use Enterprise Dockerfile (no ChromaDB)
    image: smartlib-web-enterprise:latest
    build:
      context: .
      dockerfile: Dockerfile.web.enterprise
    ports:
      - "8000:8000"
    volumes:
      - ./data:/home/data
      - ./logs:/home/logs
    env_file:
      - .env.dev
    environment:
      - LOCAL_MODE=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Override to use Enterprise tier
      - APP_EDITION=ENT
      - AUTO_PROMOTE_ADMIN=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=smartlib_admin
      - POSTGRES_PASSWORD=smartlib_dev_password
      - POSTGRES_DATABASE=smartlibdb
      - POSTGRES_SSL_MODE=disable
      - VECTOR_STORE_MODE=knowledge
      - VECTOR_STORE_PROVIDER=pgvector
      - PGVECTOR_COLLECTION_NAME=documents_vectors
      - PGVECTOR_CONNECTION_STRING=postgresql+psycopg://smartlib_admin:smartlib_dev_password@postgres:5432/smartlibdb?sslmode=disable
      - DATA_VOLUME_PATH=/home/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    # Use Enterprise Dockerfile (no ChromaDB)
    image: smartlib-worker-enterprise:latest
    build:
      context: .
      dockerfile: Dockerfile.worker.enterprise
    volumes:
      - ./data:/home/data
      - ./logs:/home/logs
    env_file:
      - .env.dev
    environment:
      - LOCAL_MODE=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      # Override to use Enterprise tier
      - APP_EDITION=ENT
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=smartlib_admin
      - POSTGRES_PASSWORD=smartlib_dev_password
      - POSTGRES_DATABASE=smartlibdb
      - POSTGRES_SSL_MODE=disable
      - VECTOR_STORE_MODE=knowledge
      - VECTOR_STORE_PROVIDER=pgvector
      - PGVECTOR_COLLECTION_NAME=documents_vectors
      - PGVECTOR_CONNECTION_STRING=postgresql+psycopg://smartlib_admin:smartlib_dev_password@postgres:5432/smartlibdb?sslmode=disable
      - DATA_VOLUME_PATH=/home/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
